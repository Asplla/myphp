<!DOCTYPE html>
<html lang="zh-cmn-Hans">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0,viewport-fit=cover">
  <title>Easexun REST API</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    html,
    body {
      position: relative;
      width: 100vw;
      height: 100vw;
      background: #FFFFFF;
      overflow: hidden;
    }

    .global-video-box {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .global-video-box video {
      position: relative;
      width: 100%;
      height: 100%;
      inset: 0;
      -o-object-position: center;
      object-position: center;
      -o-object-fit: cover;
      object-fit: cover;
      pointer-events: none;
    }

    .global-video-mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }
  </style>
</head>

<body ontouchstart>
  <div class="global-video-box">
    <video class="global-video" src="https://api.wxss.fit/src/video/video-hihonor-pc.mp4" muted="muted" playsinline=""
      autoplay="autoplay" poster="https://api.wxss.fit/src/img/video-hihonor-pc.jpg" preload="auto"></video>
    <div class="global-video-mask"></div>
  </div>
</body>

</html>
